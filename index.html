<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гео-Напоминалки</title>
    
    <!-- Яндекс Карты API -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=84e764a6-fd03-4740-beb1-328a4072c4ca&lang=ru_RU" type="text/javascript"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        
        .tabs {
            display: flex;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 10px;
            gap: 10px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--tg-theme-text-color, #000);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .tab.active {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
        }
        
        .content {
            display: none;
            padding: 16px;
        }
        
        .content.active {
            display: block;
        }
        
        #map {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            margin: 16px 0;
        }
        
        .search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            font-size: 16px;
            margin: 10px 0;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000);
        }
        
        .places-list {
            margin: 16px 0;
        }
        
        .place-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .place-name {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .place-address {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        .action-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-bg-color, #fff);
            padding: 20px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        
        .action-menu.show {
            transform: translateY(0);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }
        
        .btn-green {
            background: #2ecc71;
        }
        
        .btn-red {
            background: #e74c3c;
        }
        
        .btn-blue {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            width: 100%;
            margin: 10px 0;
        }
        
        .suggestions {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            display: none;
        }
        
        .suggestion-item {
            padding: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
            cursor: pointer;
        }
        
        .suggestion-item:last-child {
            border-bottom: none;
        }
        
        .suggestion-item:hover {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        
        .radius-control {
            margin: 20px 0;
        }
        
        .radius-control input {
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- Вкладки -->
    <div class="tabs">
        <button class="tab active" onclick="showTab('map')">🗺️ Карта</button>
        <button class="tab" onclick="showTab('places')">⭐ Избранное</button>
        <button class="tab" onclick="showTab('reminders')">🔔 Напоминания</button>
    </div>
    
    <!-- Вкладка с картой -->
    <div id="map-tab" class="content active">
        <div id="map"></div>
        
        <input type="text" class="search-input" id="searchInput" placeholder="Введите адрес..." oninput="searchAddress(this.value)">
        <div class="suggestions" id="suggestions"></div>
        
        <div id="selectedPlaceInfo" style="display: none;">
            <h3>Выбранное место:</h3>
            <p id="selectedAddress"></p>
            <input type="text" class="search-input" id="placeName" placeholder="Название места (например: Дом)">
            <button class="btn btn-blue" onclick="saveFavorite()">⭐ Добавить в избранное</button>
            
            <div class="radius-control">
                <label>Радиус срабатывания: <span id="radiusValue">200</span> м</label>
                <input type="range" min="50" max="1000" value="200" step="50" oninput="updateRadius(this.value)">
            </div>
            
            <input type="text" class="search-input" id="reminderText" placeholder="Текст напоминания">
            <button class="btn btn-blue" onclick="addReminder()">🔔 Создать напоминание</button>
        </div>
    </div>
    
    <!-- Вкладка с избранным -->
    <div id="places-tab" class="content">
        <div class="places-list" id="placesList"></div>
    </div>
    
    <!-- Вкладка с напоминаниями -->
    <div id="reminders-tab" class="content">
        <div class="places-list" id="remindersList"></div>
    </div>
    
    <!-- Меню действий для избранного места -->
    <div class="action-menu" id="actionMenu">
        <h3 id="actionPlaceName"></h3>
        <p id="actionPlaceAddress"></p>
        
        <div class="action-buttons">
            <button class="btn btn-green" onclick="showAddReminder()">🟢 Добавить напоминание</button>
            <button class="btn btn-red" onclick="deletePlace()">🔴 Удалить</button>
        </div>
        
        <button class="btn btn-blue" onclick="hideActionMenu()">Закрыть</button>
    </div>
    
    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Данные
        let map, placemark;
        let selectedCoords = null;
        let selectedAddress = '';
        let favoritePlaces = [];
        let currentPlaceId = null;
        let reminderRadius = 200;
        let myUserId = tg.initDataUnsafe?.user?.id;
        
        // Загружаем данные при старте
        loadFavorites();
        
        // Инициализация карты
        ymaps.ready(initMap);
        
        function initMap() {
            map = new ymaps.Map('map', {
                center: [55.76, 37.64],
                zoom: 10
            });
            
            // Получаем текущее местоположение
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const { latitude, longitude } = position.coords;
                        map.setCenter([latitude, longitude], 14);
                        
                        // Отправляем на сервер для проверки напоминаний
                        checkReminders(latitude, longitude);
                    },
                    error => console.log('Геолокация не доступна')
                );
            }
            
            // Клик по карте
            map.events.add('click', e => {
                const coords = e.get('coords');
                selectedCoords = coords;
                
                if (placemark) {
                    map.geoObjects.remove(placemark);
                }
                
                placemark = new ymaps.Placemark(coords, {}, {
                    preset: 'islands#redDotIcon'
                });
                map.geoObjects.add(placemark);
                
                // Получаем адрес
                ymaps.geocode(coords).then(res => {
                    const firstGeoObject = res.geoObjects.get(0);
                    selectedAddress = firstGeoObject.getAddressLine();
                    
                    document.getElementById('selectedAddress').textContent = selectedAddress;
                    document.getElementById('selectedPlaceInfo').style.display = 'block';
                    document.getElementById('searchInput').value = selectedAddress;
                });
            });
        }
        
        // Поиск адреса
        function searchAddress(query) {
            if (!query) {
                document.getElementById('suggestions').style.display = 'none';
                return;
            }
            
            ymaps.suggest(query).then(suggestions => {
                const suggestionsDiv = document.getElementById('suggestions');
                suggestionsDiv.innerHTML = '';
                
                suggestions.forEach(suggestion => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = suggestion.displayName;
                    div.onclick = () => selectSuggestion(suggestion);
                    suggestionsDiv.appendChild(div);
                });
                
                suggestionsDiv.style.display = suggestions.length ? 'block' : 'none';
            });
        }
        
        function selectSuggestion(suggestion) {
            document.getElementById('searchInput').value = suggestion.displayName;
            document.getElementById('suggestions').style.display = 'none';
            
            // Получаем координаты
            ymaps.geocode(suggestion.displayName).then(res => {
                const coords = res.geoObjects.get(0).geometry.getCoordinates();
                selectedCoords = coords;
                selectedAddress = suggestion.displayName;
                
                map.setCenter(coords, 16);
                
                if (placemark) {
                    map.geoObjects.remove(placemark);
                }
                
                placemark = new ymaps.Placemark(coords, {}, {
                    preset: 'islands#redDotIcon'
                });
                map.geoObjects.add(placemark);
                
                document.getElementById('selectedAddress').textContent = selectedAddress;
                document.getElementById('selectedPlaceInfo').style.display = 'block';
            });
        }
        
        // Сохранить в избранное
        function saveFavorite() {
            const name = document.getElementById('placeName').value;
            if (!name) {
                tg.showAlert('Введите название места');
                return;
            }
            
            const place = {
                name: name,
                address: selectedAddress,
                lat: selectedCoords[0],
                lng: selectedCoords[1]
            };
            
            tg.sendData(JSON.stringify({
                action: 'add_place',
                place: place
            }));
            
            tg.showAlert('✅ Место добавлено в избранное');
            setTimeout(() => loadFavorites(), 1000);
        }
        
        // Загрузить избранное
        function loadFavorites() {
            tg.sendData(JSON.stringify({
                action: 'get_places'
            }));
        }
        
        // Показать избранное
        function showFavorites(places) {
            favoritePlaces = places;
            const list = document.getElementById('placesList');
            
            if (!places || places.length === 0) {
                list.innerHTML = '<p style="text-align: center; padding: 40px;">Нет избранных мест</p>';
                return;
            }
            
            list.innerHTML = places.map(place => `
                <div class="place-card" onclick="openPlaceMenu('${place.id}')">
                    <div class="place-name">${place.name}</div>
                    <div class="place-address">${place.address}</div>
                </div>
            `).join('');
        }
        
        // Открыть меню места
        function openPlaceMenu(placeId) {
            const place = favoritePlaces.find(p => p.id == placeId);
            if (!place) return;
            
            currentPlaceId = placeId;
            document.getElementById('actionPlaceName').textContent = place.name;
            document.getElementById('actionPlaceAddress').textContent = place.address;
            document.getElementById('actionMenu').classList.add('show');
        }
        
        // Удалить место
        function deletePlace() {
            if (!confirm('Удалить место из избранного?')) return;
            
            tg.sendData(JSON.stringify({
                action: 'delete_place',
                place_id: currentPlaceId
            }));
            
            hideActionMenu();
            tg.showAlert('✅ Место удалено');
            setTimeout(() => loadFavorites(), 1000);
        }
        
        // Показать добавление напоминания
        function showAddReminder() {
            const place = favoritePlaces.find(p => p.id == currentPlaceId);
            if (!place) return;
            
            document.getElementById('selectedAddress').textContent = place.address;
            document.getElementById('selectedPlaceInfo').style.display = 'block';
            document.getElementById('placeName').value = place.name;
            selectedCoords = [place.lat, place.lng];
            
            hideActionMenu();
            showTab('map');
        }
        
        // Добавить напоминание
        function addReminder() {
            const text = document.getElementById('reminderText').value;
            if (!text) {
                tg.showAlert('Введите текст напоминания');
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'add_reminder',
                reminder: {
                    place_id: currentPlaceId,
                    text: text,
                    lat: selectedCoords[0],
                    lng: selectedCoords[1],
                    radius: reminderRadius
                }
            }));
            
            tg.showAlert('✅ Напоминание создано');
            document.getElementById('reminderText').value = '';
        }
        
        // Обновить радиус
        function updateRadius(value) {
            reminderRadius = value;
            document.getElementById('radiusValue').textContent = value;
        }
        
        // Проверить напоминания
        function checkReminders(lat, lng) {
            tg.sendData(JSON.stringify({
                action: 'check_location',
                lat: lat,
                lng: lng
            }));
        }
        
        // Показать вкладку
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'map') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('map-tab').classList.add('active');
                setTimeout(() => map?.container?.fitToViewport(), 100);
            } else if (tab === 'places') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('places-tab').classList.add('active');
                loadFavorites();
            } else {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('reminders-tab').classList.add('active');
            }
        }
        
        function hideActionMenu() {
            document.getElementById('actionMenu').classList.remove('show');
        }
        
        // Слушаем сообщения от бота
        window.addEventListener('message', event => {
            // Сюда придут данные от бота
        });
    </script>
</body>
</html>
