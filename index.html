<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гео-Напоминалки</title>
    
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Яндекс Карты API -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=84e764a6-fd03-4740-beb1-328a4072c4ca&lang=ru_RU" type="text/javascript"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding-bottom: 30px;
        }
        
        .tabs {
            display: flex;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 10px;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--tg-theme-text-color, #000);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .tab.active {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
        }
        
        .content {
            display: none;
            padding: 16px;
        }
        
        .content.active {
            display: block;
        }
        
        #map {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            margin: 16px 0;
        }
        
        .search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            font-size: 16px;
            margin: 10px 0;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000);
        }
        
        .places-list {
            margin: 16px 0;
        }
        
        .place-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        
        .place-card:active {
            border-color: var(--tg-theme-button-color, #40a7e3);
            transform: scale(0.98);
        }
        
        .place-name {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 4px;
        }
        
        .place-address {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
        }
        
        .action-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-bg-color, #fff);
            padding: 20px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        
        .action-menu.show {
            transform: translateY(0);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }
        
        .btn-green {
            background: #2ecc71;
        }
        
        .btn-red {
            background: #e74c3c;
        }
        
        .btn-blue {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            width: 100%;
            margin: 10px 0;
        }
        
        .suggestions {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            display: none;
            background: var(--tg-theme-bg-color, #fff);
            position: absolute;
            width: calc(100% - 32px);
            z-index: 1000;
        }
        
        .suggestion-item {
            padding: 12px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
            cursor: pointer;
        }
        
        .suggestion-item:last-child {
            border-bottom: none;
        }
        
        .suggestion-item:hover {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        
        .radius-control {
            margin: 20px 0;
        }
        
        .radius-control input {
            width: 100%;
        }
        
        .repeat-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            margin: 10px 0;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000);
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Вкладки -->
    <div class="tabs">
        <button class="tab active" onclick="showTab('map')">🗺️ Карта</button>
        <button class="tab" onclick="showTab('places')">⭐ Избранное</button>
        <button class="tab" onclick="showTab('reminders')">🔔 Напоминания</button>
    </div>
    
    <!-- Вкладка с картой -->
    <div id="map-tab" class="content active">
        <div id="map"></div>
        
        <div style="position: relative;">
            <input type="text" class="search-input" id="searchInput" placeholder="Введите адрес..." oninput="searchAddress(this.value)">
            <div class="suggestions" id="suggestions"></div>
        </div>
        
        <div id="selectedPlaceInfo" style="display: none;">
            <h3>📍 Выбранное место:</h3>
            <p id="selectedAddress"></p>
            <input type="text" class="search-input" id="placeName" placeholder="Название места (например: Дом)">
            
            <div class="radius-control">
                <label>📏 Радиус срабатывания: <span id="radiusValue">200</span> м</label>
                <input type="range" min="50" max="1000" value="200" step="50" oninput="updateRadius(this.value)">
            </div>
            
            <div>
                <label>🔄 Повтор:</label>
                <select id="repeatSelect" class="repeat-select">
                    <option value="once">Один раз</option>
                    <option value="daily">Каждый день</option>
                    <option value="weekly">Каждую неделю</option>
                    <option value="monthly">Каждый месяц</option>
                    <option value="forever">Постоянно (пока не удалю)</option>
                </select>
            </div>
            
            <input type="text" class="search-input" id="reminderText" placeholder="Текст напоминания (например: Купить молоко)">
            
            <button class="btn btn-blue" onclick="saveFavorite()">⭐ Сохранить в избранное</button>
            <button class="btn btn-green" onclick="addReminder()" style="margin-top: 10px;">🔔 Создать напоминание</button>
        </div>
    </div>
    
    <!-- Вкладка с избранным -->
    <div id="places-tab" class="content">
        <div class="places-list" id="placesList"></div>
        <button class="btn btn-blue" onclick="showTab('map')">➕ Добавить место на карте</button>
    </div>
    
    <!-- Вкладка с напоминаниями -->
    <div id="reminders-tab" class="content">
        <div class="places-list" id="remindersList"></div>
    </div>
    
    <!-- Меню действий для избранного места -->
    <div class="action-menu" id="actionMenu">
        <h3 id="actionPlaceName"></h3>
        <p id="actionPlaceAddress"></p>
        
        <div>
            <label>🔄 Повтор:</label>
            <select id="actionRepeatSelect" class="repeat-select">
                <option value="once">Один раз</option>
                <option value="daily">Каждый день</option>
                <option value="weekly">Каждую неделю</option>
                <option value="monthly">Каждый месяц</option>
                <option value="forever">Постоянно</option>
            </select>
        </div>
        
        <input type="text" class="search-input" id="actionReminderText" placeholder="Текст напоминания">
        
        <div class="action-buttons">
            <button class="btn btn-green" onclick="addReminderFromPlace()">🟢 Создать</button>
            <button class="btn btn-red" onclick="deletePlace()">🔴 Удалить место</button>
        </div>
        
        <button class="btn btn-blue" onclick="hideActionMenu()">Закрыть</button>
    </div>
    
    <script>
        // Ждем загрузки Telegram WebApp
        let tg;
        let map, placemark;
        let selectedCoords = null;
        let selectedAddress = '';
        let favoritePlaces = [];
        let reminders = [];
        let currentPlaceId = null;
        let reminderRadius = 200;
        let myUserId = null;
        
        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
                console.log('✅ Telegram WebApp инициализирован');
                myUserId = tg.initDataUnsafe?.user?.id;
                
                // Загружаем данные
                loadFavorites();
                loadReminders();
                
                // Инициализируем карту
                ymaps.ready(initMap);
            } else {
                console.log('⏳ Ожидание Telegram WebApp...');
                setTimeout(initTelegram, 100);
            }
        }
        
        // Запускаем
        initTelegram();
        
        function initMap() {
            console.log('🗺️ Инициализация карты...');
            map = new ymaps.Map('map', {
                center: [55.76, 37.64],
                zoom: 10
            });
            
            // Получаем текущее местоположение
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const { latitude, longitude } = position.coords;
                        map.setCenter([latitude, longitude], 14);
                        console.log('📍 Текущая позиция:', latitude, longitude);
                        
                        if (tg) checkReminders(latitude, longitude);
                    },
                    error => console.log('⚠️ Геолокация не доступна:', error.message)
                );
            }
            
            // Клик по карте
            map.events.add('click', e => {
                const coords = e.get('coords');
                selectedCoords = coords;
                
                if (placemark) {
                    map.geoObjects.remove(placemark);
                }
                
                placemark = new ymaps.Placemark(coords, {}, {
                    preset: 'islands#redDotIcon'
                });
                map.geoObjects.add(placemark);
                
                // Получаем адрес
                ymaps.geocode(coords).then(res => {
                    const firstGeoObject = res.geoObjects.get(0);
                    selectedAddress = firstGeoObject.getAddressLine();
                    
                    document.getElementById('selectedAddress').textContent = selectedAddress;
                    document.getElementById('selectedPlaceInfo').style.display = 'block';
                    document.getElementById('searchInput').value = selectedAddress;
                    console.log('📍 Выбран адрес:', selectedAddress);
                });
            });
            
            console.log('✅ Карта готова');
        }
        
        function searchAddress(query) {
            if (!query) {
                document.getElementById('suggestions').style.display = 'none';
                return;
            }
            
            ymaps.suggest(query).then(suggestions => {
                const suggestionsDiv = document.getElementById('suggestions');
                suggestionsDiv.innerHTML = '';
                
                suggestions.forEach(suggestion => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = suggestion.displayName;
                    div.onclick = () => selectSuggestion(suggestion);
                    suggestionsDiv.appendChild(div);
                });
                
                suggestionsDiv.style.display = suggestions.length ? 'block' : 'none';
            }).catch(error => {
                console.error('❌ Ошибка поиска:', error);
            });
        }
        
        function selectSuggestion(suggestion) {
            document.getElementById('searchInput').value = suggestion.displayName;
            document.getElementById('suggestions').style.display = 'none';
            
            ymaps.geocode(suggestion.displayName).then(res => {
                const coords = res.geoObjects.get(0).geometry.getCoordinates();
                selectedCoords = coords;
                selectedAddress = suggestion.displayName;
                
                map.setCenter(coords, 16);
                
                if (placemark) {
                    map.geoObjects.remove(placemark);
                }
                
                placemark = new ymaps.Placemark(coords, {}, {
                    preset: 'islands#redDotIcon'
                });
                map.geoObjects.add(placemark);
                
                document.getElementById('selectedAddress').textContent = selectedAddress;
                document.getElementById('selectedPlaceInfo').style.display = 'block';
            });
        }
        
        function saveFavorite() {
            const name = document.getElementById('placeName').value;
            if (!name) {
                if (tg) tg.showAlert('Введите название места');
                return;
            }
            
            if (!selectedCoords) {
                if (tg) tg.showAlert('Выберите место на карте');
                return;
            }
            
            const place = {
                name: name,
                address: selectedAddress,
                lat: selectedCoords[0],
                lng: selectedCoords[1]
            };
            
            console.log('📦 Сохранение места:', place);
            
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'add_place',
                    place: place
                }));
                
                tg.showAlert('✅ Место добавлено в избранное');
                setTimeout(() => {
                    loadFavorites();
                    showTab('places');
                }, 1000);
            }
        }
        
        function addReminder() {
            const text = document.getElementById('reminderText').value;
            if (!text) {
                if (tg) tg.showAlert('Введите текст напоминания');
                return;
            }
            
            if (!selectedCoords) {
                if (tg) tg.showAlert('Выберите место на карте');
                return;
            }
            
            const repeat = document.getElementById('repeatSelect').value;
            
            const reminder = {
                text: text,
                lat: selectedCoords[0],
                lng: selectedCoords[1],
                radius: reminderRadius,
                repeat: repeat,
                place_id: currentPlaceId
            };
            
            console.log('📦 Создание напоминания:', reminder);
            
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'add_reminder',
                    reminder: reminder
                }));
                
                tg.showAlert('✅ Напоминание создано');
                document.getElementById('reminderText').value = '';
                setTimeout(() => loadReminders(), 1000);
            }
        }
        
        function addReminderFromPlace() {
            const text = document.getElementById('actionReminderText').value;
            if (!text) {
                if (tg) tg.showAlert('Введите текст напоминания');
                return;
            }
            
            const place = favoritePlaces.find(p => p.id == currentPlaceId);
            if (!place) return;
            
            const repeat = document.getElementById('actionRepeatSelect').value;
            
            const reminder = {
                text: text,
                lat: place.lat,
                lng: place.lng,
                radius: 200,
                repeat: repeat,
                place_id: currentPlaceId
            };
            
            console.log('📦 Создание напоминания из меню:', reminder);
            
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'add_reminder',
                    reminder: reminder
                }));
                
                tg.showAlert('✅ Напоминание создано');
                hideActionMenu();
                setTimeout(() => loadReminders(), 1000);
            }
        }
        
        function loadFavorites() {
            console.log('📦 Запрос списка избранного');
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'get_places'
                }));
            }
        }
        
        function showFavorites(places) {
            console.log('📦 Получены места:', places);
            favoritePlaces = places || [];
            const list = document.getElementById('placesList');
            
            if (!favoritePlaces || favoritePlaces.length === 0) {
                list.innerHTML = '<p style="text-align: center; padding: 40px;">⭐ Нет избранных мест</p>';
                return;
            }
            
            list.innerHTML = favoritePlaces.map(place => `
                <div class="place-card" onclick="openPlaceMenu('${place.id}')">
                    <div class="place-name">${place.name}</div>
                    <div class="place-address">${place.address}</div>
                </div>
            `).join('');
        }
        
        function loadReminders() {
            console.log('📦 Запрос списка напоминаний');
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'get_reminders'
                }));
            }
        }
        
        function showReminders(remindersList) {
            console.log('📦 Получены напоминания:', remindersList);
            reminders = remindersList || [];
            const list = document.getElementById('remindersList');
            
            if (!reminders || reminders.length === 0) {
                list.innerHTML = '<p style="text-align: center; padding: 40px;">🔔 Нет активных напоминаний</p>';
                return;
            }
            
            list.innerHTML = reminders.map(r => {
                const place = favoritePlaces.find(p => p.id == r.place_id);
                const placeName = place ? place.name : '📍 Указанное место';
                const repeatText = {
                    'once': 'Один раз',
                    'daily': 'Каждый день',
                    'weekly': 'Каждую неделю',
                    'monthly': 'Каждый месяц',
                    'forever': 'Постоянно'
                }[r.repeat] || 'Один раз';
                
                return `
                    <div class="place-card">
                        <div class="place-name">🔔 ${r.text}</div>
                        <div class="place-address">${placeName}</div>
                        <div style="font-size: 12px; color: var(--tg-theme-hint-color); margin-top: 5px;">
                            🔄 ${repeatText} | 📏 ${r.radius || 200}м
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function openPlaceMenu(placeId) {
            const place = favoritePlaces.find(p => p.id == placeId);
            if (!place) return;
            
            currentPlaceId = placeId;
            document.getElementById('actionPlaceName').textContent = place.name;
            document.getElementById('actionPlaceAddress').textContent = place.address;
            document.getElementById('actionReminderText').value = '';
            document.getElementById('actionMenu').classList.add('show');
        }
        
        function deletePlace() {
            if (!confirm('Удалить место из избранного?')) return;
            
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'delete_place',
                    place_id: currentPlaceId
                }));
                
                hideActionMenu();
                tg.showAlert('✅ Место удалено');
                setTimeout(() => loadFavorites(), 1000);
            }
        }
        
        function updateRadius(value) {
            reminderRadius = value;
            document.getElementById('radiusValue').textContent = value;
        }
        
        function checkReminders(lat, lng) {
            console.log('📦 Проверка напоминаний:', lat, lng);
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'check_location',
                    lat: lat,
                    lng: lng
                }));
            }
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'map') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('map-tab').classList.add('active');
                setTimeout(() => map?.container?.fitToViewport(), 100);
            } else if (tab === 'places') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('places-tab').classList.add('active');
                loadFavorites();
            } else {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('reminders-tab').classList.add('active');
                loadReminders();
            }
        }
        
        function hideActionMenu() {
            document.getElementById('actionMenu').classList.remove('show');
        }
        
        window.addEventListener('message', event => {
            console.log('📦 Сообщение от бота:', event.data);
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'places') {
                    showFavorites(data.places);
                } else if (data.type === 'reminders') {
                    showReminders(data.reminders);
                }
            } catch (e) {
                console.error('❌ Ошибка обработки:', e);
            }
        });
    </script>
</body>
</html>
